<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f48fb1;--pink-d:#f06292;--pink-l:#fce4ec;
  --green:#a5d6a7;--green-d:#66bb6a;--green-l:#e8f5e9;
  --blue:#90caf9;--blue-d:#42a5f5;--blue-l:#e3f2fd;
  --purple:#ce93d8;--purple-l:#f3e5f5;
  --yellow-l:#fff9c4;--text:#333;--muted:#999;--border:#eee;
}
body{font-family:'Anuphan',sans-serif;min-height:100vh;background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 30%,#e8f5e9 65%,#fff9c4 100%);color:var(--text)}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 80px}
.card{background:white;border-radius:24px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.07);margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:18px;border:none;cursor:pointer;font-family:'Anuphan',sans-serif;font-size:14px;font-weight:700;transition:all .2s;width:100%}
.btn-pink{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 4px 14px rgba(244,143,177,.4)}
.btn-pink:hover{opacity:.9;transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green-d));color:white}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:white}
.btn-gray{background:#f5f5f5;color:#999}
.btn-outline{background:transparent;border:2px dashed #ddd;color:#bbb}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
input,textarea{width:100%;padding:10px 16px;border-radius:14px;border:1.5px solid var(--border);font-family:'Anuphan',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--pink)}
textarea{resize:none}
.progress-bar{background:#f0f0f0;border-radius:99px;height:8px;overflow:hidden;margin-bottom:22px}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .5s ease}
.back-btn{width:36px;height:36px;border-radius:12px;border:none;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);flex-shrink:0}
.page-header{display:flex;align-items:center;gap:12px;padding-top:20px;margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:99px;font-size:11px;font-weight:700;flex-shrink:0}
.opt-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:18px;border:2px solid var(--border);background:white;cursor:pointer;text-align:left;width:100%;font-family:'Anuphan',sans-serif;font-size:14px;font-weight:600;color:#555;transition:all .2s;margin-bottom:8px}

.land-card:hover{transform:scale(1.02);box-shadow:0 8px 28px rgba(0,0,0,.12)}

svg{display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.live-dot{width:8px;height:8px;border-radius:99px;background:#4caf50;display:inline-block;margin-right:5px;animation:pulse 1.5s ease infinite}

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── Icons ──────────────────────────────────────────────────────────────────
const I = {

  send:`<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  bar:`<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  users:`<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  back:`<svg width="18" height="18" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
  check:`<svg width="13" height="13" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  checkBig:`<svg width="48" height="48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,

  x:`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  eye:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  edit:`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  refresh:`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,
  chevron:`<svg width="18" height="18" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`,
  sparkle:`<svg width="18" height="18" fill="none" stroke="var(--pink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  copy:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  firebase:`<svg width="20" height="20" viewBox="0 0 32 32" fill="none"><path d="M5 25.5L10.5 5l6 10-3 5L5 25.5z" fill="#FFA000"/><path d="M16.5 15l3-5 7.5 15.5L16.5 15z" fill="#F57C00"/><path d="M10.5 5L16.5 15 5 25.5 10.5 5z" fill="#FFCA28"/><path d="M16.5 15l10.5 10.5-10.5 2-11.5-2L16.5 15z" fill="#FFA000"/></svg>`,
  download:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  lock:`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  alert:`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
};

const PASTEL=['#fce4ec','#e8f5e9','#fff9c4','#e3f2fd','#f3e5f5','#fff3e0'];
const ACCENT=['#f48fb1','#a5d6a7','#fff176','#90caf9','#ce93d8','#ffcc80'];

// ── Firebase Init ──────────────────────────────────────────────────────────
let db = null;
let firebaseReady = false;
const cfg = window.FIREBASE_CONFIG;
try {
  const app = initializeApp(cfg);
  db = getDatabase(app);
  firebaseReady = true;
} catch(e) {
  console.error("Firebase init failed", e);
}

// ── DB Helpers ──────────────────────────────────────────────────────────────
const DEFAULT_SURVEY = {
  creatorName:'Admin',
  title:'🎁 ของขวัญปีใหม่ 2025',
  questions:[
    {id:'q1',text:'เครื่องดื่มที่ชื่นชอบ',type:'single',options:['กาแฟ','ชา','โกโก้','น้ำผลไม้']},
    {id:'q2',text:'ขนาดเสื้อ',type:'single',options:['S','M','L','XL','XXL']},
    {id:'q3',text:'สีที่ชอบ',type:'multi',options:['ชมพู','ขาว','เหลือง','เขียวมิ้นต์','ฟ้า']},
    {id:'q4',text:'ความต้องการพิเศษ',type:'text',options:[]},
  ]
};

async function dbGetSurvey() {
  if (!firebaseReady) return JSON.parse(localStorage.getItem('gift_survey')||'null') || DEFAULT_SURVEY;
  const snap = await get(ref(db,'survey'));
  return snap.exists() ? snap.val() : DEFAULT_SURVEY;
}

async function dbSaveSurvey(s) {
  if (!firebaseReady) { localStorage.setItem('gift_survey', JSON.stringify(s)); return; }
  await set(ref(db,'survey'), s);
}

async function dbAddResponse(r) {
  if (!firebaseReady) {
    const arr = JSON.parse(localStorage.getItem('gift_responses')||'[]');
    arr.push(r); localStorage.setItem('gift_responses', JSON.stringify(arr)); return;
  }
  await push(ref(db,'responses'), r);
}

async function dbClearResponses() {
  if (!firebaseReady) { localStorage.removeItem('gift_responses'); return; }
  await remove(ref(db,'responses'));
}

function dbListenResponses(callback) {
  if (!firebaseReady) {
    const arr = JSON.parse(localStorage.getItem('gift_responses')||'[]');
    callback(arr);
    return () => {};
  }
  const unsub = onValue(ref(db,'responses'), snap => {
    const val = snap.val();
    const arr = val ? Object.entries(val).map(([k,v])=>({...v,_key:k})) : [];
    callback(arr);
  });
  return unsub;
}

// ── State ──────────────────────────────────────────────────────────────────
let currentPage = 'loading';
let previewMode = false;
let survey = null;
let responses = [];
let unsubResponses = null;

// User mode = เข้ามาจากลิ้งค์ #survey โดยตรง → ล็อคอยู่แค่หน้าตอบ
const IS_USER_MODE = location.hash === '#survey';

function getHashPage() {
  const h = location.hash;
  if(h==='#survey') return 'survey';
  if(!IS_USER_MODE && h==='#results') return 'results';
  if(!IS_USER_MODE && h==='#admin') return 'admin';
  return IS_USER_MODE ? 'survey' : 'landing';
}

async function init() {
  survey = await dbGetSurvey();
  unsubResponses = dbListenResponses(arr => {
    responses = arr;
    if (currentPage === 'results') render();
  });
  currentPage = getHashPage();
  render();
}

function navigate(page) {
  if (IS_USER_MODE && page !== 'survey') return; // ล็อค User ไม่ให้ออก
  currentPage = page;
  if(page==='survey') location.hash='survey';
  else if(page==='results') location.hash='results';
  else if(page==='admin') location.hash='admin';
  else location.hash='';
  render();
}

window.navigate = navigate;
window.addEventListener('hashchange', () => {
  if (IS_USER_MODE && location.hash !== '#survey') {
    location.hash = '#survey';
    return;
  }
  currentPage = getHashPage();
  render();
});

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0', 2400);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.className='fade';
  if(currentPage==='landing') app.innerHTML='', app.appendChild(landingPage());
  else if(currentPage==='admin') app.innerHTML='', app.appendChild(adminPage());
  else if(currentPage==='survey') app.innerHTML='', app.appendChild(surveyPage(previewMode));
  else if(currentPage==='results') app.innerHTML='', app.appendChild(resultsPage());
}

// ── Util ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Landing ─────────────────────────────────────────────────────────────────

    <div style="width:100%;max-width:420px;background:linear-gradient(135deg,#e3f2fd,#f3e5f5);border-radius:22px;padding:16px 18px;margin-bottom:16px">
      <p style="font-size:12px;font-weight:700;color:#666;margin-bottom:8px">🔗 ลิ้งค์ตอบแบบสำรวจ — แชร์ได้เลย!</p>
      <div style="display:flex;gap:8px">

      </button>
      <button class="land-card" id="btn-survey">
        <div class="land-icon" style="background:linear-gradient(135deg,#a5d6a7,#66bb6a)">${I.send.replace('currentColor','white')}</div>
        <div style="flex:1"><div style="font-weight:700;color:#333;font-size:15px">ตอบแบบสำรวจ</div><div style="font-size:13px;color:#aaa">มีผู้ตอบแล้ว ${responses.length} คน</div></div>
        ${I.chevron}
      </button>
      <button class="land-card" id="btn-results">
        <div class="land-icon" style="background:linear-gradient(135deg,#90caf9,#42a5f5)">${I.bar.replace('currentColor','white')}</div>
        <div style="flex:1"><div style="font-weight:700;color:#333;font-size:15px">ดูผลสรุป</div><div style="font-size:13px;color:#aaa">Live update · ${responses.length} คำตอบ</div></div>
        ${I.chevron}
      </button>
    </div>
  `;
  div.querySelector('#btn-admin').onclick=()=>navigate('admin');
  div.querySelector('#btn-survey').onclick=()=>navigate('survey');
  div.querySelector('#btn-results').onclick=()=>navigate('results');
  div.querySelector('#copy-btn').onclick=()=>{
    const el=div.querySelector('#survey-link');
    navigator.clipboard.writeText(el.value).then(()=>toast('✅ คัดลอกลิ้งค์แล้ว!')).catch(()=>{el.select();document.execCommand('copy');toast('✅ คัดลอกแล้ว!');});
  };
  return div;
}

// ── Admin ───────────────────────────────────────────────────────────────────
function adminPage() {
  let draft = JSON.parse(JSON.stringify(survey));
  const div = document.createElement('div');
  div.innerHTML=`<div class="wrap" id="aw"></div>`;

  const renderAdmin=()=>{
    const wrap=div.querySelector('#aw');
    wrap.innerHTML=`
      <div class="page-header">
        <button class="back-btn" id="btn-back">${I.back}</button>
        <div style="flex:1">
          <h2 style="font-weight:800;font-size:21px;color:#333">Admin Dashboard</h2>
          <p style="font-size:12px;color:#aaa">สร้างและจัดการแบบสำรวจ</p>
        </div>
        <button id="btn-preview" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:14px;border:none;background:#e3f2fd;color:#1976d2;font-weight:700;font-size:13px;cursor:pointer;font-family:'Anuphan',sans-serif">${I.eye} Preview</button>
      </div>
      <div class="card">
        <h3 style="font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#333">${I.sparkle} ข้อมูลพื้นฐาน</h3>
        <label style="font-size:12px;font-weight:700;color:#888;display:block;margin-bottom:4px">ชื่อผู้สร้าง</label>
        <input id="inp-creator" value="${esc(draft.creatorName)}" style="margin-bottom:10px"/>
        <label style="font-size:12px;font-weight:700;color:#888;display:block;margin-bottom:4px">ชื่อแบบสำรวจ</label>
        <input id="inp-title" value="${esc(draft.title)}"/>
      </div>
      <div id="ql"></div>
      <div style="display:flex;gap:10px">
        <button id="btn-addq" class="btn btn-outline" style="flex:1">${I.plus} เพิ่มคำถาม</button>
        <button id="btn-save" class="btn btn-pink" style="flex:1">${I.edit} บันทึก</button>
      </div>
    `;
    wrap.querySelector('#btn-back').onclick=()=>navigate('landing');
    wrap.querySelector('#btn-preview').onclick=()=>{survey=JSON.parse(JSON.stringify(draft));previewMode=true;navigate('survey');};
    wrap.querySelector('#inp-creator').addEventListener('input',e=>draft.creatorName=e.target.value);
    wrap.querySelector('#inp-title').addEventListener('input',e=>draft.title=e.target.value);
    wrap.querySelector('#btn-addq').onclick=()=>{draft.questions.push({id:'q'+Date.now(),text:'',type:'single',options:['']});renderQList();};
    wrap.querySelector('#btn-save').onclick=async()=>{
      const btn=wrap.querySelector('#btn-save');
      btn.disabled=true; btn.textContent='กำลังบันทึก...';
      survey=JSON.parse(JSON.stringify(draft));
      await dbSaveSurvey(survey);
      btn.disabled=false; btn.innerHTML=I.edit+' บันทึก';
      toast('✅ บันทึกแล้ว!');
    };
    renderQList();
  };

  const renderQList=()=>{
    const list=div.querySelector('#ql');
    list.innerHTML='';
    draft.questions.forEach((q,qi)=>{
      const qc=document.createElement('div');
      qc.className='q-card'; qc.style.borderLeft=`4px solid ${ACCENT[qi%ACCENT.length]}`;
      qc.innerHTML=`
        <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:10px">
          <span class="badge" style="background:${PASTEL[qi%PASTEL.length]};color:#777">${qi+1}</span>
          <input class="qt-inp" value="${esc(q.text)}" placeholder="คำถาม..." style="flex:1;font-weight:700"/>
          <button class="rm-q" style="background:#fff0f3;border:none;border-radius:10px;padding:6px 8px;cursor:pointer;flex-shrink:0">${I.x.replace('currentColor','#f48fb1')}</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          ${['single','multi','text'].map((t,ti)=>`
            <button class="type-btn tsel" data-t="${t}" style="background:${q.type===t?['#fce4ec','#e8f5e9','#e3f2fd'][ti]:'#f5f5f5'};color:${q.type===t?['#e91e63','#388e3c','#1565c0'][ti]:'#999'}">
              ${['เลือกข้อเดียว','หลายข้อ','พิมพ์ตอบ'][ti]}
            </button>`).join('')}
        </div>
        ${q.type!=='text'?`
          <div class="opts-list">
            ${q.options.map((o,oi)=>`
              <div style="display:flex;gap:6px;margin-bottom:6px">
                <input class="opt-inp" value="${esc(o)}" placeholder="ตัวเลือก ${oi+1}" data-oi="${oi}"/>
                <button class="rm-opt" data-oi="${oi}" style="background:#f5f5f5;border:none;border-radius:10px;padding:6px 8px;cursor:pointer">${I.x.replace('currentColor','#ccc')}</button>
              </div>`).join('')}
            <button class="add-opt" style="display:flex;align-items:center;gap:5px;padding:5px 10px;background:none;border:1.5px dashed #ddd;border-radius:10px;cursor:pointer;font-size:12px;color:#bbb;font-weight:700;font-family:'Anuphan',sans-serif">${I.plus} เพิ่มตัวเลือก</button>
          </div>`:''}
      `;
      qc.querySelector('.qt-inp').addEventListener('input',e=>{q.text=e.target.value;});
      qc.querySelector('.rm-q').onclick=()=>{draft.questions=draft.questions.filter(x=>x.id!==q.id);renderQList();};
      qc.querySelectorAll('.tsel').forEach(b=>b.onclick=()=>{q.type=b.dataset.t;renderQList();});
      if(q.type!=='text'){
        qc.querySelectorAll('.opt-inp').forEach(inp=>inp.addEventListener('input',e=>{q.options[parseInt(e.target.dataset.oi)]=e.target.value;}));
        qc.querySelectorAll('.rm-opt').forEach(b=>b.onclick=()=>{q.options=q.options.filter((_,j)=>j!==parseInt(b.dataset.oi));renderQList();});
        qc.querySelector('.add-opt').onclick=()=>{q.options.push('');renderQList();};
      }
      list.appendChild(qc);
    });
  };

  renderAdmin();
  return div;
}

// ── Survey ───────────────────────────────────────────────────────────────────
function surveyPage(preview=false) {
  const qs = survey.questions;
  let step=0, userName='', answers={};
  const div = document.createElement('div');
  div.innerHTML=`<div class="wrap" id="sw"></div>`;

  const renderStep=()=>{
    const wrap=div.querySelector('#sw');
    const total=qs.length+1;
    wrap.innerHTML=`
      <div class="page-header">
        <button class="back-btn" id="btn-back">${I.back}</button>
        <div style="flex:1">
          <h2 style="font-weight:800;font-size:19px;color:#333">${preview?'👁 Preview Mode':esc(survey.title)}</h2>
          ${preview?'<p style="font-size:12px;color:var(--pink);margin:0">ดูตัวอย่างก่อนส่งจริง</p>':''}
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(step/total*100)}%"></div></div>
      <div id="sc"></div>
    `;
    wrap.querySelector('#btn-back').onclick=()=>{
      if(step>0){step--;renderStep();}
      else if(!IS_USER_MODE){previewMode=false;navigate(preview?'admin':'landing');}
    };
    // User mode: hide back button on step 0 (no escape route)
    if(IS_USER_MODE && step===0) wrap.querySelector('#btn-back').style.visibility='hidden';

    const sc=wrap.querySelector('#sc');

    if(step===0){
      sc.innerHTML=`
        <div class="card" style="text-align:center">
          <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#fce4ec,#f3e5f5);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
            ${I.users.replace('currentColor','#f48fb1').replace(/width="18" height="18"/,'width="30" height="30"')}
          </div>
          <h3 style="font-weight:800;font-size:20px;color:#333;margin-bottom:6px">สวัสดี! 👋</h3>
          <p style="color:#aaa;margin-bottom:20px">กรุณาระบุชื่อก่อนเริ่มตอบ</p>
          <input id="name-inp" value="${esc(userName)}" placeholder="ชื่อ หรือชื่อเล่น" style="text-align:center;font-weight:700;margin-bottom:16px;font-size:15px"/>
          <button class="btn btn-pink" id="start-btn" ${!userName.trim()?'disabled':''}>เริ่มตอบแบบสำรวจ →</button>
        </div>`;
      const ni=sc.querySelector('#name-inp');
      ni.addEventListener('input',e=>{userName=e.target.value;sc.querySelector('#start-btn').disabled=!userName.trim();});
      sc.querySelector('#start-btn').onclick=()=>{if(userName.trim()){step=1;renderStep();}};
    } else {
      const q=qs[step-1], ans=answers[q.id];
      sc.innerHTML=`
        <div class="card">
          <p style="font-size:12px;font-weight:700;color:var(--pink);margin-bottom:4px">ข้อ ${step} / ${qs.length}</p>
          <h3 style="font-weight:800;font-size:18px;color:#333;margin-bottom:18px">${esc(q.text)||'คำถาม...'}</h3>
          <div id="aa"></div>
          <div style="display:flex;gap:10px;margin-top:20px">
            ${step>1?`<button class="btn btn-gray" id="btn-prev" style="flex:0 0 auto;padding:12px 20px">← ย้อน</button>`:''}
            <button class="btn btn-pink" id="btn-next" style="flex:1">${step<qs.length?'ถัดไป →':preview?'จบ Preview':'ส่งคำตอบ 🎉'}</button>
          </div>
        </div>`;
      const aa=sc.querySelector('#aa');
      if(q.type==='text'){
        const ta=document.createElement('textarea');
        ta.rows=4;ta.value=ans||'';ta.placeholder='พิมพ์คำตอบที่นี่...';
        ta.addEventListener('input',e=>{answers[q.id]=e.target.value;});
        aa.appendChild(ta);
      } else {
        q.options.forEach(opt=>{
          const sel=q.type==='multi'?(ans||[]).includes(opt):ans===opt;
          const b=document.createElement('button');
          b.className='opt-btn'+(sel?' selected':'');
          b.innerHTML=`<div class="opt-check">${sel?I.check:''}</div><span>${esc(opt)}</span>`;
          b.onclick=()=>{
            if(q.type==='multi'){const c=answers[q.id]||[];answers[q.id]=c.includes(opt)?c.filter(x=>x!==opt):[...c,opt];}
            else answers[q.id]=opt;
            renderStep();
          };
          aa.appendChild(b);
        });
      }
      sc.querySelector('#btn-next').onclick=async()=>{
        if(step<qs.length){step++;renderStep();}
        else{
          if(preview){previewMode=false;navigate('admin');return;}
          const btn=sc.querySelector('#btn-next');
          btn.disabled=true;btn.textContent='กำลังส่ง...';
          await dbAddResponse({name:userName,answers:JSON.parse(JSON.stringify(answers)),ts:Date.now()});
          showSuccess(userName);
        }
      };
      if(step>1) sc.querySelector('#btn-prev').onclick=()=>{step--;renderStep();};
    }
  };

  const showSuccess=(name)=>{
    const wrap=div.querySelector('#sw');
    wrap.innerHTML=`
      <div style="min-height:85vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px">
        <div class="success-icon">${I.checkBig}</div>
        <h2 style="font-size:32px;font-weight:800;color:#333;margin-bottom:8px">ขอบคุณ! 🎉</h2>
        <p style="color:#aaa;margin-bottom:28px">บันทึกคำตอบของ <strong style="color:#333">${esc(name)}</strong> เรียบร้อยแล้ว</p>
        ${IS_USER_MODE ? '' : `
          <button class="btn btn-pink" id="go-results" style="max-width:200px">ดูผลสรุป</button>
          <button class="btn btn-gray" id="go-home" style="max-width:200px;margin-top:10px">กลับหน้าหลัก</button>
        `}
      </div>`;
    if (!IS_USER_MODE) {
      wrap.querySelector('#go-results').onclick=()=>navigate('results');
      wrap.querySelector('#go-home').onclick=()=>navigate('landing');
    }
  };

  renderStep();
  return div;
}

// ── Results ──────────────────────────────────────────────────────────────────
function resultsPage() {
  const div = document.createElement('div');
  div.innerHTML=`<div class="wrap" id="rw"></div>`;
  const wrap=div.querySelector('#rw');
  const qs=survey.questions;

  const getStats=q=>{
    if(q.type==='text') return null;
    const counts={};q.options.forEach(o=>counts[o]=0);
    responses.forEach(r=>{
      const a=r.answers[q.id];if(!a)return;
      (Array.isArray(a)?a:[a]).forEach(v=>{if(v in counts)counts[v]++;});
    });
    const total=q.type==='multi'?Object.values(counts).reduce((s,n)=>s+n,0):responses.filter(r=>r.answers?.[q.id]).length;
    return {data:Object.entries(counts).map(([l,c])=>({label:l,count:c})),total};
  };

  let statsHTML='';
  qs.forEach((q,qi)=>{
    const s=getStats(q);
    let body='';
    if(s){
      if(s.total>0){
        body=[...s.data].sort((a,b)=>b.count-a.count).map((item,i)=>{
          const pct=Math.round((item.count/s.total)*100);
          return `<div class="bar-row">
            <div class="bar-label"><span>${esc(item.label)}</span><span>${item.count} คน (${pct}%)</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${ACCENT[i%ACCENT.length]},${ACCENT[(i+2)%ACCENT.length]})"></div></div>
          </div>`;
        }).join('');
      } else body='<p style="font-size:12px;color:#ddd;margin-top:8px">ยังไม่มีคำตอบ</p>';
    } else {
      body=responses.filter(r=>r.answers?.[q.id]).map(r=>`
        <div style="display:flex;gap:6px;font-size:12px;margin-bottom:3px">
          <span style="color:var(--pink);font-weight:700;flex-shrink:0">${esc(r.name)}:</span>
          <span style="color:#555">${esc(r.answers[q.id])}</span>
        </div>`).join('') || '<p style="font-size:12px;color:#ddd;margin-top:4px">ยังไม่มีคำตอบ</p>';
    }
    statsHTML+=`
      <div class="card" style="border-left:4px solid ${ACCENT[qi%ACCENT.length]}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="badge" style="background:${PASTEL[qi%PASTEL.length]};color:#777">${qi+1}</span>
          <span style="font-weight:700;font-size:14px;color:#333">${esc(q.text)}</span>
          <span style="font-size:11px;color:#bbb">${q.type==='text'?'พิมพ์ตอบ':q.type==='multi'?'หลายข้อ':'ข้อเดียว'}</span>
        </div>${body}
      </div>`;
  });

  const respHTML=responses.length?responses.map((r,i)=>`
    <div class="resp-card" style="background:${PASTEL[i%PASTEL.length]}">
      <div style="font-weight:700;font-size:14px;color:#555;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span style="width:22px;height:22px;border-radius:99px;background:white;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${i+1}</span>
        ${esc(r.name)}
      </div>
      ${qs.map(q=>{
        const a=r.answers?.[q.id];
        if(!a||(Array.isArray(a)&&!a.length)) return '';
        const val=Array.isArray(a)?a.map(v=>`<span class="chip">${esc(v)}</span>`).join(''):esc(a);
        return `<div style="font-size:12px;margin-bottom:2px"><span style="color:#aaa">${esc(q.text)}:</span> <span style="color:#444;font-weight:600">${val}</span></div>`;
      }).join('')}
    </div>`).join(''):'';

  wrap.innerHTML=`
    <div class="page-header">
      <button class="back-btn" id="btn-back">${I.back}</button>
      <div style="flex:1">
        <h2 style="font-weight:800;font-size:21px;color:#333">ผลสรุปการสำรวจ</h2>
        <p style="font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px">
          <span class="live-dot"></span>${I.users} Live · ${responses.length} คน
        </p>
      </div>
      <button id="btn-clear" style="width:36px;height:36px;border-radius:12px;border:none;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08)" title="ล้างข้อมูล">
        ${I.refresh.replace('currentColor','#f48fb1')}
      </button>
    </div>
    ${responses.length===0?`
      <div class="card" style="text-align:center;padding:48px 20px">
        ${I.bar.replace(/width="22" height="22"/,'width="52" height="52"').replace('currentColor','#e0e0e0')}
        <p style="color:#ccc;margin-top:12px">ยังไม่มีผู้ตอบแบบสำรวจ</p>
      </div>`:statsHTML}
    ${responses.length?`<div class="card">
      <h3 style="font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#333">${I.users.replace('currentColor','#90caf9')} รายชื่อผู้ตอบทั้งหมด</h3>
      ${respHTML}
    </div>`:''}
  `;

  wrap.querySelector('#btn-back').onclick=()=>navigate('landing');
  wrap.querySelector('#btn-clear').onclick=async()=>{
    if(confirm('ล้างคำตอบทั้งหมด?')){
      await dbClearResponses();
      toast('🗑 ล้างข้อมูลแล้ว');
    }
  };
  return div;
}

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
